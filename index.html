<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics of India | Minimal Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --text: #e5e5e5;
            --text-dim: #a0a0a0;
            --accent: #ff3b30;
            --max-width: 1100px;
            --reading-width: 720px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* Minimal Header */
        nav {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 3rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            letter-spacing: -1.5px;
            font-size: 1.2rem;
            text-transform: lowercase;
        }

        /* Hero / Header Section */
        header {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 4rem 1.5rem 8rem 1.5rem;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.05;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        .hero-meta {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: var(--reading-width);
        }

        /* Featured Reports - Editorial Style */
        .section-label {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }

        #reports-container {
            max-width: var(--max-width);
            margin: 2rem auto 8rem auto;
            padding: 0 1.5rem;
        }

        .report-entry {
            max-width: var(--reading-width);
            margin-bottom: 6rem;
        }

        .report-entry h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .report-body {
            font-size: 1.15rem;
            color: var(--text);
            white-space: pre-wrap;
            opacity: 0.9;
        }

        /* News Sections */
        .news-section {
            background-color: var(--surface);
            padding: 8rem 1.5rem;
        }

        .news-wrapper {
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 4rem 3rem;
            margin-top: 3rem;
        }

        .news-card {
            display: flex;
            flex-direction: column;
        }

        .news-card .source {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 0.75rem;
        }

        .news-card h3 {
            font-size: 1.25rem;
            line-height: 1.4;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .news-card p {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            border-bottom: 1px solid var(--accent);
            align-self: flex-start;
            padding-bottom: 2px;
            transition: opacity 0.2s;
        }

        .news-card a:hover { opacity: 0.7; }

        footer {
            padding: 6rem 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .loading { color: var(--text-dim); font-style: italic; }

        @media (max-width: 768px) {
            header h1 { font-size: 3rem; }
            .report-entry h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">analytics of india.</div>
    </nav>

    <header>
        <h1 id="dynamic-greeting">Intelligence,<br>Distilled.</h1>
        <div class="hero-meta" id="last-updated">Synchronizing global and local streams...</div>
    </header>

    <div class="section-label">Featured Investigation</div>
    <main id="reports-container">
        <div class="loading">Parsing editorial reports...</div>
    </main>

    <div class="news-section">
        <div class="news-wrapper">
            <div class="section-label" style="color: var(--text-dim)">Local Stream / India</div>
            <div class="news-grid" id="india-container"></div>
        </div>
        
        <div class="news-wrapper" style="margin-top: 8rem;">
            <div class="section-label" style="color: var(--text-dim)">Global Stream</div>
            <div class="news-grid" id="global-container"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Analytics of India. All rights reserved.
    </footer>

    <script>
        async function loadData() {
            const reportsContainer = document.getElementById('reports-container');
            const indiaContainer = document.getElementById('india-container');
            const globalContainer = document.getElementById('global-container');
            const updatedNode = document.getElementById('last-updated');

            try {
                const response = await fetch('data.json?v=' + new Date().getTime());
                const data = await response.json();

                // 1. Render Reports (Editorial Style)
                const reports = data.filter(i => i.type === 'report');
                reportsContainer.innerHTML = reports.map(r => `
                    <article class="report-entry">
                        <h2>${r.title}</h2>
                        <div class="report-body">${r.body}</div>
                    </article>
                `).join('');

                // 2. Render News (Airy Grid)
                const india = data.filter(i => i.type === 'news' && i.region === 'india');
                const global = data.filter(i => i.type === 'news' && i.region === 'global');

                const newsMapper = item => `
                    <div class="news-card">
                        <div class="source">${item.source}</div>
                        <h3>${item.title}</h3>
                        <p>${item.summary.replace(/&nbsp;/g, ' ')}</p>
                        <a href="${item.link}" target="_blank">Read Full Report →</a>
                    </div>
                `;

                indiaContainer.innerHTML = india.map(newsMapper).join('');
                globalContainer.innerHTML = global.map(newsMapper).join('');

                updatedNode.textContent = `Last Transmission: ${new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;

            } catch (e) {
                reportsContainer.innerHTML = `<div class="loading">System offline. Please check back shortly.</div>`;
            }
        }
        window.onload = loadData;
    </script>
</body>
</html>
