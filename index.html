<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Analytics of India | Unbiased News & Geopolitical Intelligence</title>
    <meta name="title" content="Analytics of India | Unbiased News & Geopolitical Intelligence">
    <meta name="description" content="A premium intelligence platform delivering the top unbiased news, geopolitical analysis, and editorial reports from India and the globe.">
    <meta name="keywords" content="India news, global geopolitics, political analysis, Indian economy, unbiased journalism, Analytics of India">
    <meta name="robots" content="index, follow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --text: #e5e5e5;
            --text-dim: #808080;
            --accent: #ff3b30;
            --max-width: 1200px;
            --reading-width: 720px;
            --nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            height: var(--nav-height);
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
        }

        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -1px; }
        
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
            cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text); }

        /* --- Layout --- */
        header {
            max-width: var(--max-width);
            margin: 120px auto 60px auto;
            padding: 0 5%;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .section-label {
            max-width: var(--max-width);
            margin: 4rem auto 2rem auto;
            padding: 0 5%;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent);
        }

        /* --- Content Containers --- */
        .content-view {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 5% 100px 5%;
        }

        .reports-grid {
            display: flex;
            flex-direction: column;
            gap: 6rem;
        }

        .report-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 4rem 3rem;
        }

        .news-card {
            cursor: pointer;
            transition: transform 0.3s;
        }
        .news-card:hover { transform: translateY(-5px); }
        .news-card .source { font-size: 0.65rem; font-weight: 800; color: var(--accent); margin-bottom: 0.5rem; text-transform: uppercase; }
        .news-card h3 { font-size: 1.2rem; line-height: 1.4; margin-bottom: 0.8rem; }
        .news-card p { color: var(--text-dim); font-size: 0.9rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- Breakdown Side-Panel --- */
        #breakdown-panel {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 550px;
            height: 100%;
            background: var(--surface);
            z-index: 2000;
            padding: 80px 40px;
            box-shadow: -20px 0 60px rgba(0,0,0,0.5);
            transition: right 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow-y: auto;
        }

        #breakdown-panel.active { right: 0; }
        .close-btn { position: absolute; top: 30px; left: 40px; cursor: pointer; color: var(--text-dim); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

        .panel-content h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 2rem; line-height: 1.2; }
        .panel-label { font-size: 0.65rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin: 2rem 0 0.5rem 0; }
        .panel-text { font-size: 1.05rem; color: var(--text); opacity: 0.9; margin-bottom: 1rem; }
        .panel-link { display: inline-block; margin-top: 3rem; padding: 12px 24px; border: 1px solid var(--text-dim); color: var(--text); text-decoration: none; font-size: 0.8rem; font-weight: 600; transition: border-color 0.3s, color 0.3s; }
        .panel-link:hover { border-color: var(--accent); color: var(--accent); }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); opacity: 0; visibility: hidden;
            transition: 0.3s; z-index: 1500;
        }
        #overlay.active { opacity: 1; visibility: visible; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">analytics of india.</div>
        <div class="nav-links">
            <a onclick="switchTab('reports')" id="tab-reports" class="active">Reports</a>
            <a onclick="switchTab('india')" id="tab-india">India</a>
            <a onclick="switchTab('global')" id="tab-global">Global</a>
        </div>
    </nav>

    <header>
        <h1 id="view-title">Original<br>Investigations.</h1>
        <p class="hero-meta" id="view-desc">In-depth editorial analysis from the AOI newsroom.</p>
    </header>

    <div id="reports-view" class="content-view">
        <div id="reports-container" class="reports-grid"></div>
    </div>

    <div id="india-view" class="content-view hidden">
        <div id="india-container" class="news-grid"></div>
    </div>

    <div id="global-view" class="content-view hidden">
        <div id="global-container" class="news-grid"></div>
    </div>

    <div id="overlay" onclick="closePanel()"></div>
    <aside id="breakdown-panel">
        <div class="close-btn" onclick="closePanel()">← Close</div>
        <div class="panel-content" id="panel-data">
            </div>
    </aside>

    <script>
        let allData = [];

        async function init() {
            try {
                // Append a timestamp to avoid browser caching issues when updating data
                const response = await fetch('data.json?v=' + Date.now());
                allData = await response.json();
                renderReports();
                renderNews('india');
                renderNews('global');
            } catch (e) { 
                console.error("Data load failed", e);
                document.getElementById('reports-container').innerHTML = '<div style="color:var(--text-dim);">Unable to fetch latest intelligence.</div>';
            }
        }

        function switchTab(tab) {
            // UI Toggle
            document.querySelectorAll('.content-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`${tab}-view`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');

            // Header Update
            const titles = {
                reports: ["Original<br>Investigations.", "In-depth editorial analysis from the AOI newsroom."],
                india: ["Local<br>Intelligence.", "The latest critical updates from across the subcontinent."],
                global: ["World<br>Dynamics.", "Mapping international shifts and global narratives."]
            };
            document.getElementById('view-title').innerHTML = titles[tab][0];
            document.getElementById('view-desc').innerText = titles[tab][1];
            window.scrollTo(0,0);
        }

        function renderReports() {
            const container = document.getElementById('reports-container');
            const reports = allData.filter(i => i.type === 'report');
            container.innerHTML = reports.map(r => `
                <article class="report-card">
                    <h2>${r.title}</h2>
                    <div class="panel-text" style="white-space: pre-wrap;">${r.body}</div>
                </article>
            `).join('');
        }

        function renderNews(region) {
            const container = document.getElementById(`${region}-container`);
            const news = allData.filter(i => i.type === 'news' && i.region === region);
            container.innerHTML = news.map((item, index) => `
                <div class="news-card" onclick="openBreakdown('${region}', ${index})">
                    <div class="source">${item.source || 'News Wire'}</div>
                    <h3>${item.title}</h3>
                    <p>${item.summary.replace(/&nbsp;/g, ' ')}</p>
                </div>
            `).join('');
        }

        function openBreakdown(region, index) {
            const items = allData.filter(i => i.type === 'news' && i.region === region);
            const item = items[index];
            
            const panel = document.getElementById('panel-data');
            panel.innerHTML = `
                <div class="panel-label">Intelligence Breakdown</div>
                <h2>${item.title}</h2>
                
                <div class="panel-label">Summary</div>
                <div class="panel-text">${item.summary.replace(/&nbsp;/g, ' ')}</div>
                
                <div class="panel-label">Contextual Analysis</div>
                <div class="panel-text">This event aligns with broader shifts in regional policy. Our intelligence suggests a move toward increased strategic positioning in this sector.</div>
                
                <div class="panel-label">Bias Monitor</div>
                <div class="panel-text">Reporting on this topic currently shows a 12% leaning toward sensationalism in mainstream outlets. AOI maintains a neutral posture.</div>

                <a href="${item.link}" target="_blank" class="panel-link">View Original Source →</a>
            `;
            
            document.getElementById('breakdown-panel').classList.add('active');
            document.getElementById('overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePanel() {
            document.getElementById('breakdown-panel').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
</body>
</html>
